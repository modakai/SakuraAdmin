# 公共配置文件
# @author sakura
# @from sakura
spring:
  application:
    name: sakura-interview-api
  # 默认 dev 环境
  profiles:
    active: dev
  # 支持 swagger3
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  # 数据库配置
  # todo 需替换配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/sakura_interview
    username: root
    password: root

  # 文件上传
  servlet:
    multipart:
      # 大小限制
      max-file-size: 10MB
  # Redis 配置
  # todo 需替换配置，然后取消注释
  data:
    redis:
      database: 1
      host: localhost
      port: 6379
      timeout: 5000
server:
  address: 0.0.0.0
  port: 8101
  servlet:
    context-path: /api
mybatis-flex:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  type-aliases-package: com.sakura.interview.infra.persistence.entity
# 微信相关
wx:
  # 微信公众平台
