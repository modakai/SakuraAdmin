# 公共配置文件
# @author sakura
# @from sakura
server:
  address: 0.0.0.0
  port: 8101
  servlet:
    context-path: /api
spring:
  application:
    name: sakura-boot-init-api
  # 默认 dev 环境
  profiles:
    active: dev
  # 导入后端根目录下的 .env 配置文件
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:.env.${spring.profiles.active}[.properties]
      - optional:file:.env.local[.properties]
  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/sakura_boot_init
    username: root
    password: root

  # 文件上传
  servlet:
    multipart:
      # 大小限制
      max-file-size: 10MB
  # Redis 配置
  data:
    redis:
      database: 1
      host: localhost
      port: 6379
      timeout: 5000

mybatis-flex:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  type-aliases-package: com.sakura.boot_init.infra.persistence.entity
# 微信相关
wx:
  # 微信公众平台
  mp:
    token: ${WX_MP_TOKEN:xxx}
    aesKey: ${WX_MP_AES_KEY:xxx}
    appId: ${WX_MP_APP_ID:xxx}
    secret: ${WX_MP_SECRET:xxx}
    config-storage:
      http-client-type: HttpClient
      key-prefix: wx
      redis:
        host: 127.0.0.1
        port: 6379
      type: Memory
  # 微信开放平台
  open:
    appId: ${WX_OPEN_APP_ID:xxx}
    appSecret: ${WX_OPEN_APP_SECRET:xxx}
# 对象存储
oss:
  enable: false
  # 对应云厂商的站点域名
  endpoint: 127.0.0.1:9000
  # 对应云厂商桶的绑定域名
  domain: ''
  accessKey: ${OSS_ACCESS_KEY:}
  secretKey: ${OSS_SECRET_KEY:}
  # 前缀
  prefix: ''
  # 存储空间名/桶名
  bucketName: default
  # 存储区域
  region: ''
  # 是否https（Y=是,N=否）
  isHttps: N
  # 桶权限类型(0private 1public 2custom)
  accessPolicy: 1
