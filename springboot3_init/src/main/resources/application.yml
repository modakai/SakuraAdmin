  endpoint: 127.0.0.1:9000
  # 对应云厂商桶的绑定域名
  domain: ''
  accessKey: UBCX82S9TLNq4WxkTBOJ
  secretKey: j0uPaCTvUKaOCU82tjFW8qdWeZxdsGOOp7mFX0yP
  # 前缀
