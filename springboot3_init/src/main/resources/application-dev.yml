server:
  port: 8101

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/sakura_boot_init
    username: root
    password: root
  data:
    redis:
      database: 1
      host: localhost
      port: 6379
      timeout: 5000
      password:

mybatis-flex:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

logging:
  level:
    com.sakura.boot_init.user.repository: debug
    com.sakura.boot_init.agreement.repository: debug
    com.sakura.boot_init.dict.repository: debug
    com.sakura.boot_init.audit.repository: debug
