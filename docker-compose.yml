# Sakura Admin 项目级容器编排。
services:
  mysql:
    image: mysql:8.4
    container_name: sakura-mysql
    restart: unless-stopped
    environment:
      # 默认密码仅用于本地模板启动，生产环境必须通过环境变量覆盖。
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-sakura_boot_init}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - sakura-mysql-data:/var/lib/mysql
      - ./springboot3_init/sql/create_table.sql:/docker-entrypoint-initdb.d/01-create-table.sql:ro
      - ./springboot3_init/sql/init_data.sql:/docker-entrypoint-initdb.d/02-init-data.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: sakura-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - sakura-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./springboot3_init
    container_name: sakura-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      redis-init:
        condition: service_completed_successfully
    environment:
      # Spring Boot 支持通过环境变量覆盖 application-prod.yml。
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8101
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-sakura_boot_init}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_DATABASE: 1
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      OSS_ACCESS_KEY: ${OSS_ACCESS_KEY:-}
      OSS_SECRET_KEY: ${OSS_SECRET_KEY:-}
      WX_MP_TOKEN: ${WX_MP_TOKEN:-}
      WX_MP_AES_KEY: ${WX_MP_AES_KEY:-}
      WX_MP_APP_ID: ${WX_MP_APP_ID:-}
      WX_MP_SECRET: ${WX_MP_SECRET:-}
      WX_OPEN_APP_ID: ${WX_OPEN_APP_ID:-}
      WX_OPEN_APP_SECRET: ${WX_OPEN_APP_SECRET:-}
    ports:
      - "${API_PORT:-8101}:8101"

  web:
    build:
      context: ./shadcn-vue-app
      args:
        # 默认将前端暴露到宿主机 80 端口，因此浏览器访问 http://localhost/api。
        VITE_SERVER_API_URL: ${VITE_SERVER_API_URL:-http://localhost}
        VITE_SERVER_API_PREFIX: ${VITE_SERVER_API_PREFIX:-/api}
        VITE_SERVER_API_TIMEOUT: ${VITE_SERVER_API_TIMEOUT:-8000}
        VITE_AUTH_TOKEN_HEADER_NAME: ${VITE_AUTH_TOKEN_HEADER_NAME:-Authorization}
        VITE_AUTH_TOKEN_HEADER_PREFIX: ${VITE_AUTH_TOKEN_HEADER_PREFIX:-Bearer }
        VITE_AUTH_COMPATIBILITY_TOKEN_HEADER_ENABLED: ${VITE_AUTH_COMPATIBILITY_TOKEN_HEADER_ENABLED:-true}
        VITE_AUTH_COMPATIBILITY_TOKEN_HEADER_NAME: ${VITE_AUTH_COMPATIBILITY_TOKEN_HEADER_NAME:-token}
        VITE_APP_TITLE: ${VITE_APP_TITLE:-Sakura Admin}
    container_name: sakura-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-80}:80"

volumes:
  sakura-mysql-data:
  sakura-redis-data:
